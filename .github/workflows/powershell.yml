name: PSScriptAnalyzer and Security Checks

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '15 16 * * 5'

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  build:
    permissions:
      contents: read
      security-events: write
      actions: read
    name: PSScriptAnalyzer and Security Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install PSScriptAnalyzer
        shell: pwsh
        run: |
          Install-Module -Name PSScriptAnalyzer -Force -Scope CurrentUser

      - name: Run PSScriptAnalyzer with Security Rules
        id: pssa
        shell: pwsh
        run: |
          # Sicherheitsrelevante Regeln
          $securityRules = @(
              'PSAvoidGlobalAliases',
              'PSAvoidUsingConvertToSecureStringWithPlainText'
          )

          # Analyse durchführen
          $results = Invoke-ScriptAnalyzer -Path .\ -Recurse -IncludeRule $securityRules
          if ($results) {
              $results | ConvertTo-Json -Depth 10 -Compress | Out-File -FilePath pssa_results.json
              $results | Format-List
              "has_errors=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          } else {
              Write-Host "No security issues found by PSScriptAnalyzer."
              "has_errors=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          }

      - name: Upload PSScriptAnalyzer Results to GitHub Security Tab
        if: steps.pssa.outputs.has_errors == 'true'
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: pssa_results.json

      - name: Fail build if security issues were found
        if: always()
        shell: pwsh
        run: |
          if (Test-Path pssa_results.json) {
              Write-Error "PSScriptAnalyzer found security issues. Check the GitHub Security tab for details."
              exit 1
          }
