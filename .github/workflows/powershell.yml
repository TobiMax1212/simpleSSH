name: PSScriptAnalyzer and Security Checks

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '15 16 * * 5'

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  build:
    name: PSScriptAnalyzer and Security Checks
    runs-on: [self-hosted, linux, arm64]
    
    steps:
      - name: Code auschecken
        uses: actions/checkout@v4

      # NEU: Behebt den libpsl-native Bug im ARM64-Runner-Image
      - name: Fix and Ensure PowerShell is installed (ARM64)
        shell: bash
        run: |
          # Prüfen, ob das installierte pwsh kaputt ist (sucht nach liblibpsl)
          if command -v pwsh >/dev/null 2>&1; then
            echo "Prüfe vorhandenes pwsh..."
            if pwsh -v 2>&1 | grep -q "DllNotFoundException"; then
              echo "Defektes pwsh erkannt. Entferne es..."
              sudo apt-get remove -y powershell || true
            else
              echo "pwsh ist vorhanden und funktioniert."
              exit 0
            fi
          fi

          echo "Installiere offizielles Microsoft PowerShell für ARM64..."
          sudo apt-get update
          sudo apt-get install -y ca-certificates curl apt-transport-https gnupg
          
          # Microsoft GPG-Key hinzufügen
          curl -fsSL https://packages.microsoft.com/keys/microsoft.asc | sudo gpg --dearmor --yes -o /usr/share/keyrings/microsoft.gpg
          
          # Microsoft Repository für Ubuntu 22.04 (Basis des Runner-Images) hinzufügen
          echo "deb [signed-by=/usr/share/keyrings/microsoft.gpg arch=arm64] https://packages.microsoft.com/ubuntu/22.04/prod jammy main" | sudo tee /etc/apt/sources.list.d/microsoft-prod.list
          
          sudo apt-get update
          sudo apt-get install -y powershell
          echo "Offizielles pwsh erfolgreich installiert: $(pwsh -v)"

      - name: Install PSScriptAnalyzer
        shell: pwsh
        run: |
          [Net.ServicePointManager]::SecurityProtocol = [Net.SecurityProtocolType]::Tls12
          Set-PSRepository -Name "PSGallery" -InstallationPolicy Trusted
          
          if (-not (Get-Module -ListAvailable -Name PSScriptAnalyzer)) {
              Write-Host "Installiere PSScriptAnalyzer..."
              Install-Module -Name PSScriptAnalyzer -Force -Scope CurrentUser -ErrorAction Stop
          } else {
              Write-Host "PSScriptAnalyzer ist bereits vorhanden."
          }

      - name: Run PSScriptAnalyzer with Security Rules
        id: pssa
        shell: pwsh
        run: |
          $securityRules = @(
              'PSAvoidGlobalAliases',
              'PSAvoidUsingConvertToSecureStringWithPlainText'
          )

          $results = Invoke-ScriptAnalyzer -Path .\ -Recurse -IncludeRule $securityRules
          
          if ($results) {
              $results | ConvertTo-Json -Depth 10 -Compress | Out-File -FilePath pssa_results.json
              $results | Format-List
              "has_errors=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          } else {
              Write-Host "No security issues found by PSScriptAnalyzer."
              "has_errors=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          }

      - name: Fail build if security issues were found
        if: always()
        shell: pwsh
        run: |
          if (Test-Path pssa_results.json) {
              Write-Error "PSScriptAnalyzer found security issues in your PowerShell scripts!"
              exit 1
          }
