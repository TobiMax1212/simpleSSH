name: PSScriptAnalyzer and Security Checks

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '15 16 * * 5'

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  build:
    name: PSScriptAnalyzer and Security Checks
    runs-on: [self-hosted, linux, arm64]
    
    steps:
      - name: Code auschecken
        uses: actions/checkout@v4

      # Installiert nun die von PSScriptAnalyzer geforderte Mindestversion 7.4.6
      - name: Fix and Ensure PowerShell is installed (ARM64)
        shell: bash
        run: |
          echo "Bereinige alte Versionen..."
          sudo rm -f /etc/apt/sources.list.d/microsoft-prod.list
          sudo apt-get remove -y powershell || true
          sudo rm -f /usr/bin/pwsh
          sudo rm -rf /opt/microsoft/powershell/7

          echo "Installiere curl und tar (falls fehlend)..."
          sudo apt-get update
          sudo apt-get install -y curl tar

          echo "Lade offizielles PowerShell v7.4.6 für ARM64 herunter..."
          curl -L -o /tmp/powershell.tar.gz https://github.com/PowerShell/PowerShell/releases/download/v7.4.6/powershell-7.4.6-linux-arm64.tar.gz

          echo "Entpacke und konfiguriere PowerShell v7.4.6..."
          sudo mkdir -p /opt/microsoft/powershell/7
          sudo tar zxf /tmp/powershell.tar.gz -C /opt/microsoft/powershell/7
          sudo chmod +x /opt/microsoft/powershell/7/pwsh
          sudo ln -sf /opt/microsoft/powershell/7/pwsh /usr/bin/pwsh

          echo "Erfolgreich installiert: $(pwsh -v)"

      - name: Install PSScriptAnalyzer
        shell: pwsh
        run: |
          [Net.ServicePointManager]::SecurityProtocol = [Net.SecurityProtocolType]::Tls12
          Set-PSRepository -Name "PSGallery" -InstallationPolicy Trusted
          
          if (-not (Get-Module -ListAvailable -Name PSScriptAnalyzer)) {
              Write-Host "Installiere PSScriptAnalyzer..."
              Install-Module -Name PSScriptAnalyzer -Force -Scope CurrentUser -ErrorAction Stop
          } else {
              Write-Host "PSScriptAnalyzer ist bereits vorhanden."
          }

      - name: Run PSScriptAnalyzer with Security Rules
        id: pssa
        shell: pwsh
        run: |
          $securityRules = @(
              'PSAvoidGlobalAliases',
              'PSAvoidUsingConvertToSecureStringWithPlainText'
          )

          $results = Invoke-ScriptAnalyzer -Path .\ -Recurse -IncludeRule $securityRules
          
          if ($results) {
              $results | ConvertTo-Json -Depth 10 -Compress | Out-File -FilePath pssa_results.json
              $results | Format-List
              "has_errors=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          } else {
              Write-Host "No security issues found by PSScriptAnalyzer."
              "has_errors=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          }

      - name: Fail build if security issues were found
        if: always()
        shell: pwsh
        run: |
          if (Test-Path pssa_results.json) {
              Write-Error "PSScriptAnalyzer found security issues in your PowerShell scripts!"
              exit 1
          }